[platformio]
extra_configs = secret.ini
default_envs = m5stack-atoms3-lite

[base]
extra_scripts =
build_flags =
    -DUDP_DATA_PORT=${secret.udp_data_port}
    -DLOCAL_QUEUE_SIZE=${secret.local_queue_size}
    -DINTERNET_QUEUE_SIZE=${secret.internet_queue_size}
    -DUSE_QUEUE=${secret.use_queue}
    -DUSE_AES=${secret.use_aes}
lib_deps = 

[s3core]
platform = espressif32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
extra_scripts = 
    ${base.extra_scripts}
build_flags =
    ${base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSE_SERIAL=1
    -DSERIAL_SPEED=${s3core.monitor_speed}
    -DPREFS_NAME='${secret.prefs_name}'
    -DWIFI_SSID='${secret.wifi_ssid}'
    -DWIFI_PASSWORD='${secret.wifi_password}'
    -DOTA_PASSWORD='${secret.ota_password}'
    -DTZ_FULL='${secret.tz_full}'
    -DHEX_KEY='${secret.aes_key}'
lib_deps = 
    ${base.lib_deps}
test_ignore = test_native

[m5stack]
extends = s3core
build_flags =
    ${s3core.build_flags}
    -DESP32S3=1
    -DIS_M5=1
lib_deps =
    ${s3core.lib_deps}

[env:m5stack-atoms3-lite]
extends = m5stack
board = m5stack-atoms3
build_flags =
    ${m5stack.build_flags}
    -DBUILD="m5stack-atoms3-lite"
    -DDB_LVL=0xFF
    -DLOG_SERIAL=Serial
    -DHAVE_RTC=0
;     -DCORE_DEBUG_LEVEL=5
; monitor_filters = esp32_exception_decoder
; build_type = debug
